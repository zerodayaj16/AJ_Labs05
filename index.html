<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SentinelVault DLP</title><style>
:root{--bg:#07101d;--panel:#0d1929;--panel2:#111f32;--border:#21334a;--text:#edf5ff;--muted:#8798ad;--cyan:#43d9c3;--blue:#5d83ff;--red:#ff607d;--amber:#ffb454}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% 0,#10243d 0,transparent 32%),var(--bg);color:var(--text);font-family:Arial,sans-serif}.shell{min-height:100vh;display:grid;grid-template-columns:220px 1fr}aside{background:#071321;border-right:1px solid var(--border);padding:24px 14px;display:flex;flex-direction:column}.brand{display:flex;gap:10px;align-items:center;padding:0 10px 28px}.brand>span{color:var(--cyan);font-size:24px}.brand b{display:block;font-size:15px}.brand small{display:block;font-size:8px;letter-spacing:1.7px;color:var(--muted);margin-top:3px}nav{display:grid;gap:5px}nav button{border:0;background:transparent;color:var(--muted);display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:7px;text-align:left;cursor:pointer}nav button:hover,nav button.active{background:#132943;color:var(--text)}nav button.active{box-shadow:inset 2px 0 var(--cyan)}nav i{font-style:normal;width:17px}nav em{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:1px 6px;font-style:normal;font-size:10px}.local{margin-top:auto;border:1px solid var(--border);border-radius:8px;padding:12px;font-size:10px}.local b{display:block;color:var(--cyan);margin-bottom:5px}.local span{color:var(--muted);line-height:1.45}.workspace{padding:26px 30px;min-width:0}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}h1{margin:0;font-size:23px}header p,.panel-head p{margin:5px 0 0;color:var(--muted);font-size:11px}.header-actions{display:flex;align-items:center;gap:9px}button,.upload{background:#14243a;border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;cursor:pointer;font-size:11px}.pill{font-size:9px;color:var(--cyan);border:1px solid var(--border);padding:6px 9px;border-radius:20px}.primary{background:linear-gradient(135deg,#397bea,#42c7c0);border:0}.hero{display:flex;align-items:center;gap:30px;padding:25px 28px;border:1px solid var(--border);border-radius:12px;background:linear-gradient(120deg,#10233a,#0c1929);margin-bottom:15px}.hero small{color:var(--cyan);letter-spacing:1.2px;font-size:9px}.hero h2{font-size:21px;margin:7px 0}.hero p{color:var(--muted);font-size:12px}.risk-ring{--risk:0;width:130px;height:130px;display:grid;place-items:center;border-radius:50%;background:conic-gradient(var(--red) calc(var(--risk)*1%),#26354a 0);position:relative}.risk-ring:before{content:"";position:absolute;inset:11px;background:#0e1c2e;border-radius:50%}.risk-ring div{position:relative;text-align:center}.risk-ring b{display:block;font-size:30px}.risk-ring span{font-size:9px;color:var(--muted)}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:15px}.kpis article,.panel{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:16px}.kpis span{font-size:10px;color:var(--muted)}.kpis b{display:block;font-size:24px;margin:7px 0}.kpis small{font-size:9px;color:var(--muted)}.bad{color:var(--red)!important}.good{color:var(--cyan)!important}.grid{display:grid;grid-template-columns:1.4fr 1fr;gap:15px}.panel h3{font-size:12px;margin:0 0 16px}.bar{display:grid;grid-template-columns:130px 1fr 25px;align-items:center;gap:10px;font-size:10px;margin:12px 0}.bar i{height:7px;background:#1c2c40;border-radius:5px;overflow:hidden}.bar u{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan))}.channel{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:10px}.channel b{color:var(--cyan)}.scanner{max-width:900px;margin:auto;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:22px}.scan-intro{text-align:center;padding:8px 10px 18px}.scan-intro>span{font-size:34px;color:var(--cyan)}.scan-intro h2{font-size:18px;margin:8px}.scan-intro p{font-size:11px;color:var(--muted)}.upload{display:inline-block;margin-top:8px}.upload input{display:none}.scanner textarea{width:100%;min-height:300px;background:#07111e;border:1px solid var(--border);border-radius:8px;padding:14px;color:var(--text);font:11px monospace;resize:vertical}.scan-actions{display:flex;justify-content:flex-end;gap:8px;align-items:center;margin-top:10px}.scan-actions span{margin-right:auto;color:var(--muted);font-size:10px}.panel-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}.incidents{overflow:auto}table{width:100%;border-collapse:collapse;font-size:10px}th{text-align:left;color:var(--muted);padding:10px;border-bottom:1px solid var(--border)}td{padding:11px 10px;border-bottom:1px solid #17283a}code{color:#b7c9dd}select{background:#0a1726;color:var(--text);border:1px solid var(--border);padding:5px;border-radius:4px;font-size:10px}.sev{font-size:8px;text-transform:uppercase;font-weight:bold;padding:3px 7px;border-radius:4px}.critical{color:#ff8ca0;background:#3b1924}.high{color:#ffc071;background:#3a2919}.medium{color:#78e4d0;background:#12352f}.policy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.policy h3{margin:14px 0 7px}.policy p{color:var(--muted);font-size:11px;line-height:1.5}.policy footer{display:flex;justify-content:space-between;align-items:center;margin-top:18px}.policy footer span{font-size:9px;color:var(--cyan)}.empty{text-align:center;color:var(--muted);padding:30px}.tall{padding:100px 30px}.hidden{display:none!important}.toast{position:fixed;right:20px;bottom:20px;background:#142940;border:1px solid var(--cyan);padding:11px 15px;border-radius:7px;font-size:11px}.view{animation:in .18s ease}@keyframes in{from{opacity:.3;transform:translateY(4px)}}@media(max-width:850px){.shell{grid-template-columns:70px 1fr}.brand div,nav button span{display:none}.brand{padding-left:7px}nav button{justify-content:center}.local{display:none}.kpis{grid-template-columns:repeat(2,1fr)}.grid,.policy-grid{grid-template-columns:1fr}.workspace{padding:20px 15px}.pill{display:none}}
</style></head><body><main class="shell"><aside><div class="brand"><span>◆</span><div><b>SentinelVault</b><small>DLP CONTROL CENTER</small></div></div><nav id="nav"></nav><div class="local"><b>● Local analysis</b><span>Your scanned data stays in this browser session.</span></div></aside><section class="workspace"><header><div><h1 id="title">Data Protection Overview</h1><p>Discover, classify and protect sensitive information.</p></div><div class="header-actions"><span class="pill">POLICIES ACTIVE · 6</span><button onclick="loadSample()">Load sample</button></div></header><div id="content"></div></section><div id="toast" class="toast hidden"></div></main><script>
const patterns=[{type:'Private key',severity:'Critical',re:/-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----/gi,policy:'Block private keys'},{type:'API key',severity:'Critical',re:/(?:api[_-]?key|secret)[\s:=]+["']?[A-Za-z0-9_\-]{16,}/gi,policy:'Protect credentials'},{type:'Credit card',severity:'High',re:/\b(?:\d[ -]*?){13,16}\b/g,policy:'PCI data protection'},{type:'Email address',severity:'Medium',re:/\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/gi,policy:'Personal data handling'},{type:'Indian PAN',severity:'High',re:/\b[A-Z]{5}[0-9]{4}[A-Z]\b/g,policy:'India PII protection'},{type:'Aadhaar-like ID',severity:'High',re:/\b\d{4}[ -]\d{4}[ -]\d{4}\b/g,policy:'India PII protection'}];
const sample='Customer export\nName: Priya Sharma\nEmail: priya.sharma@example.com\nPAN: ABCDE1234F\nAadhaar: 2345 6789 0123\nCredit card: 4111 1111 1111 1111\napi_key = sk_live_51N8xExampleSecret98765\n-----BEGIN PRIVATE KEY-----';let view='overview',text='',findings=[],statuses={};const names={overview:'Data Protection Overview',scan:'Sensitive Data Scanner',incidents:'Incidents',policies:'Policies',entities:'Entities',reports:'Reports'},icons={overview:'◫',scan:'⌕',incidents:'⚠',policies:'▣',entities:'◎',reports:'▤'};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),mask=v=>v.length<8?'••••':v.slice(0,3)+'•'.repeat(Math.min(14,v.length-6))+v.slice(-3);function toast(s){const e=document.getElementById('toast');e.textContent=s;e.classList.remove('hidden');setTimeout(()=>e.classList.add('hidden'),2200)}function setView(v){view=v;render()}function loadSample(){text=sample;view='scan';render()}function scan(value=text,source='Pasted content'){findings=[];patterns.forEach(p=>{for(const m of value.matchAll(p.re)){findings.push({id:findings.length+1,type:p.type,severity:p.severity,masked:mask(m[0]),policy:p.policy,source})}});view='incidents';render();toast(findings.length+' sensitive-data matches detected')}function score(){return Math.min(100,findings.reduce((n,f)=>n+(f.severity==='Critical'?30:f.severity==='High'?16:7),0))}
function renderNav(){document.getElementById('nav').innerHTML=Object.keys(names).map(n=>`<button class="${view===n?'active':''}" onclick="setView('${n}')"><i>${icons[n]}</i><span>${n[0].toUpperCase()+n.slice(1)}</span>${n==='incidents'&&findings.length?`<em>${findings.length}</em>`:''}</button>`).join('')}function render(){renderNav();document.getElementById('title').textContent=names[view];const c=document.getElementById('content');if(view==='overview')c.innerHTML=overview();if(view==='scan')c.innerHTML=scanner();if(view==='incidents')c.innerHTML=incidents();if(view==='policies')c.innerHTML=policies();if(view==='entities'||view==='reports')c.innerHTML=`<div class="panel empty tall"><h2>${view==='entities'?'Entity risk profiles':'Compliance reports'}</h2><p>${view==='entities'?'User, device, department, and destination risk will appear after scans are correlated.':'Generate PCI DSS, privacy, and incident-summary reports from reviewed findings.'}</p><button class="primary" onclick="setView('scan')">Run first scan</button></div>`}
function overview(){const s=score(),counts={};findings.forEach(f=>counts[f.type]=(counts[f.type]||0)+1);return `<div class="hero"><div class="risk-ring" style="--risk:${s}"><div><b>${s}</b><span>Risk score</span></div></div><div><small>DATA EXPOSURE POSTURE</small><h2>${s>65?'Immediate action required':s>25?'Elevated exposure':'Protection baseline healthy'}</h2><p>${findings.length?findings.length+' sensitive items require review across the current scan.':'Run a scan or load the sample dataset to assess exposure.'}</p><button class="primary" onclick="setView('scan')">Start a data scan →</button></div></div><div class="kpis"><article><span>Open incidents</span><b>${findings.length}</b><small class="bad">${findings.filter(f=>f.severity==='Critical').length} critical</small></article><article><span>Sensitive records</span><b>${findings.length}</b><small>Current session</small></article><article><span>Policies triggered</span><b>${new Set(findings.map(f=>f.policy)).size}</b><small>of 6 active</small></article><article><span>Protected channels</span><b>5</b><small class="good">All monitored</small></article></div><div class="grid"><article class="panel"><h3>Exposure by data type</h3>${Object.keys(counts).length?Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`<div class="bar"><span>${esc(t)}</span><i><u style="width:${n/findings.length*100}%"></u></i><b>${n}</b></div>`).join(''):'<div class="empty">No scan data yet</div>'}</article><article class="panel"><h3>Monitored channels</h3>${['Email','Cloud storage','Web uploads','USB devices','Source code'].map(x=>`<div class="channel"><span>${x}</span><b>● Protected</b></div>`).join('')}</article></div>`}
function scanner(){return `<div class="scanner"><div class="scan-intro"><span>⌕</span><h2>Inspect content for sensitive data</h2><p>Paste text or upload a JSON, CSV, TXT, or LOG file. Detected values are masked.</p><label class="upload">Upload file<input id="file" type="file" accept=".txt,.csv,.json,.log" onchange="readFile(this)"></label></div><textarea id="scantext" oninput="text=this.value" placeholder="Paste customer records, logs, source code, or email content…">${esc(text)}</textarea><div class="scan-actions"><span>${text.length.toLocaleString()} characters</span><button onclick="text='';render()">Clear</button><button class="primary" onclick="text=document.getElementById('scantext').value;scan()">Scan sensitive data</button></div></div>`}function readFile(i){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{text=String(r.result);scan(text,f.name)};r.readAsText(f)}
function incidents(){return `<div class="panel incidents"><div class="panel-head"><div><h3>DLP incident queue</h3><p>Masked findings from the current browser session</p></div><button onclick="setView('scan')">New scan</button></div>${findings.length?`<table><thead><tr><th>Severity</th><th>Data type</th><th>Masked evidence</th><th>Policy</th><th>Source</th><th>Status</th></tr></thead><tbody>${findings.map(f=>`<tr><td><span class="sev ${f.severity.toLowerCase()}">${f.severity}</span></td><td><b>${esc(f.type)}</b></td><td><code>${esc(f.masked)}</code></td><td>${esc(f.policy)}</td><td>${esc(f.source)}</td><td><select onchange="statuses[${f.id}]=this.value"><option>New</option><option>Investigating</option><option>Escalated</option><option>Closed</option></select></td></tr>`).join('')}</tbody></table>`:'<div class="empty tall">No incidents. Run a sensitive-data scan first.</div>'}</div>`}function policies(){return `<div class="policy-grid">${patterns.map(p=>`<article class="panel policy"><span class="sev ${p.severity.toLowerCase()}">${p.severity}</span><h3>${p.policy}</h3><p>Detect and control exposure of ${p.type.toLowerCase()} content across monitored channels.</p><footer><span>● Enabled</span><button onclick="toast('Policy editor ready for the next version')">Configure</button></footer></article>`).join('')}</div>`}render();
</script></body></html>
